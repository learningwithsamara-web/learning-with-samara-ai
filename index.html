<!DOCTYPE html>
<html>
<head>
  <title>Learning With Samara AI</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 30px; }
    button { margin: 10px; padding: 10px 20px; font-size: 16px; }
    input { padding: 5px; font-size: 16px; width: 50px; text-align: center; }
  </style>
</head>
<body>

<h1>Learning With Samara AI</h1>
<p>Hi! I'm Samara AI. Let's learn something new today!</p>

<h2>Math Practice</h2>
<p>What is 5 + 3?</p>

<input type="number" id="answer" placeholder="?" />
<button onclick="checkAnswer()">Submit</button>

<p id="result"></p>

<script>
  function checkAnswer() {
    let answer = document.getElementById("answer").value;
    if(answer == 8){
      document.getElementById("result").innerHTML = "✅ Correct! Great job!";
    } else {
      document.getElementById("result").innerHTML = "❌ Try again!";
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Connect to Supabase
  const supabaseUrl = 'https://bfivpvlzehtmksnmgnzb.supabase.co';
  const supabaseKey = 'bfivpvlzehtmksnmgnzb';
  const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

  async function saveScore(student, score, subject){
    const { data, error } = await supabase
      .from('scores')
      .insert([{ student, score, subject }]);

    if(error) console.log('Error saving score:', error);
    else console.log('Score saved!', data);
  }

  function checkAnswer() {
    let answer = document.getElementById("answer").value;
    let resultText = '';
    let score = 0;

    if(answer == 8){
      resultText = "✅ Correct! Great job!";
      score = 1;
    } else {
      resultText = "❌ Try again!";
    }

    document.getElementById("result").innerHTML = resultText;

    // Save to Supabase
    saveScore('student1', score, 'math');
  }
</script>
</body>
</html>
