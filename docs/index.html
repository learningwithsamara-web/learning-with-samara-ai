<!DOCTYPE html>
<html>
<head>
<title>Learning With Samara AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🌟 Learning With Samara AI</h1>
<img src="logo.png" class="logo">
<p>Welcome to your learning adventure!</p>

<h2>Choose a World</h2>

<div class="worlds">

<button onclick="startWorld(1)">🌍 World 1: Addition</button>

<button onclick="locked()">🔒 World 2: Subtraction</button>

<button onclick="locked()">🔒 World 3: Multiplication</button>

<button onclick="locked()">🔒 World 4: Fractions</button>

</div>

<div id="gameArea" style="display:none">

<h2 id="question"></h2>

<input type="number" id="answer">

<button onclick="checkAnswer()">Submit</button>

<p id="result"></p>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
